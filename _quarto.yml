project:
  type: website
  output-dir: docs
  render:
    - "*.qmd"
    - "**/*.qmd"
  resources:
    - "images/"
    - "assets/"
    - "publications/images_publications/"
    - "highlights/images_highlights/"

website:
  title: "DigiPols"
  description: "The Digital Politics & Political Communication Research Lab — Cyprus University of Technology"
  site-url: "https://digipols.com"
  favicon: assets/digipols-beacon-mark.svg
  navbar:
    background: light
    logo: assets/digipols-beacon.svg
    logo-dark: assets/digipols-beacon-dark.svg
    logo-alt: "DigiPols"
    title: false
    left:
      - href: research.qmd
        text: Research
      - href: publications.qmd
        text: Publications
      - href: highlights.qmd
        text: Highlights
      - href: team.qmd
        text: Team
  page-footer:
    background: light
    border: true
    left: |
      © 2026 DigiPols Lab · Department of Communication & Internet Studies, Cyprus University of Technology
    right: |
      Built with [Quarto](https://quarto.org)

format:
  html:
    theme: [cosmo, digipols.scss]
    css: styles.css
    toc: true
    toc-location: right
    fontsize: 1rem
    grid:
      sidebar-width: 220px
      body-width: 920px
      margin-width: 220px

knitr:
  opts_chunk:
    comment: "#>"
    collapse: true
